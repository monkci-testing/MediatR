name: CI-logs-test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    runs-on: [self-hosted, monkci-runners-4vcpu]

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.0
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Build
        run: dotnet build --configuration Release

      - name: Test
        run: dotnet test --configuration Release --no-build --logger trx --results-directory TestResults

      - name: Report Test Results
        uses: dorny/test-reporter@v1.9.1
        if: success() || failure()
        with:
          name: Test Results (Linux - self-hosted)
          path: '**/TestResults/**/*.trx'
          reporter: dotnet-trx

      - name: Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-linux-self-hosted
          path: artifacts/**/
